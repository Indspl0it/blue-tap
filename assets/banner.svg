<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0d1025"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00aacc"/>
    </linearGradient>
    <linearGradient id="tapGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bf5af2"/>
      <stop offset="100%" style="stop-color:#ff3366"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#bf5af2;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="lineGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bf5af2;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ff3366;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a3a" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <clipPath id="rounded">
      <rect width="1200" height="300" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#rounded)">
    <rect width="1200" height="300" fill="url(#bg)"/>
    <rect width="1200" height="300" fill="url(#grid)"/>

    <!-- Decorative circuit traces -->
    <!-- Left side traces -->
    <line x1="0" y1="80" x2="180" y2="80" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
    <line x1="180" y1="80" x2="180" y2="130" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
    <circle cx="180" cy="130" r="3" fill="#00d4ff" opacity="0.2"/>
    <line x1="0" y1="220" x2="140" y2="220" stroke="#00d4ff" stroke-width="1" opacity="0.12"/>
    <line x1="140" y1="220" x2="140" y2="180" stroke="#00d4ff" stroke-width="1" opacity="0.12"/>
    <circle cx="140" cy="180" r="2" fill="#00d4ff" opacity="0.15"/>
    <line x1="0" y1="150" x2="100" y2="150" stroke="#bf5af2" stroke-width="1" opacity="0.1"/>

    <!-- Right side traces -->
    <line x1="1200" y1="100" x2="1020" y2="100" stroke="#bf5af2" stroke-width="1" opacity="0.15"/>
    <line x1="1020" y1="100" x2="1020" y2="160" stroke="#bf5af2" stroke-width="1" opacity="0.15"/>
    <circle cx="1020" cy="160" r="3" fill="#bf5af2" opacity="0.2"/>
    <line x1="1200" y1="200" x2="1060" y2="200" stroke="#ff3366" stroke-width="1" opacity="0.12"/>
    <line x1="1060" y1="200" x2="1060" y2="240" stroke="#ff3366" stroke-width="1" opacity="0.12"/>
    <circle cx="1060" cy="240" r="2" fill="#ff3366" opacity="0.15"/>

    <!-- Top/bottom accent lines -->
    <rect x="0" y="0" width="1200" height="2" fill="url(#lineGrad)"/>
    <rect x="0" y="298" width="1200" height="2" fill="url(#lineGrad2)"/>

    <!-- Bluetooth symbol (left area) -->
    <g transform="translate(155, 150)" opacity="0.12">
      <path d="M 0,-40 L 20,0 L 0,40 M 0,-40 L -20,-20 L 20,0 L -20,20 L 0,40"
            fill="none" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Bluetooth symbol (right area, smaller) -->
    <g transform="translate(1050, 140) scale(0.6)" opacity="0.08">
      <path d="M 0,-40 L 20,0 L 0,40 M 0,-40 L -20,-20 L 20,0 L -20,20 L 0,40"
            fill="none" stroke="#bf5af2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Car silhouette hint (subtle, bottom right) -->
    <g transform="translate(1080, 252)" opacity="0.08">
      <path d="M-60,0 L-50,-15 L-35,-25 L10,-25 L25,-15 L35,0 Z" fill="none" stroke="#ff3366" stroke-width="1.5"/>
      <circle cx="-40" cy="2" r="6" fill="none" stroke="#ff3366" stroke-width="1.5"/>
      <circle cx="20" cy="2" r="6" fill="none" stroke="#ff3366" stroke-width="1.5"/>
    </g>

    <!-- Signal waves (left of Bluetooth symbol) -->
    <g transform="translate(110, 150)" opacity="0.08">
      <path d="M0,-15 Q-12,0 0,15" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
      <path d="M-8,-25 Q-25,0 -8,25" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
      <path d="M-18,-35 Q-40,0 -18,35" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    </g>

    <!-- Main title: BLUE -->
    <text x="360" y="145" font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="80" font-weight="800" letter-spacing="-2" fill="url(#blueGrad)" filter="url(#glow)">
      BLUE
    </text>

    <!-- Separator dash -->
    <text x="628" y="145" font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="80" font-weight="300" fill="#444466">
      -
    </text>

    <!-- Main title: TAP -->
    <text x="665" y="145" font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="80" font-weight="800" letter-spacing="-2" fill="url(#tapGrad)" filter="url(#glow)">
      TAP
    </text>

    <!-- Tagline -->
    <text x="600" y="185" font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="16" font-weight="400" fill="#667799" text-anchor="middle" letter-spacing="4">
      BLUETOOTH/BLE PENETRATION TESTING TOOLKIT
    </text>

    <!-- Sub-tagline -->
    <text x="600" y="210" font-family="'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
          font-size="13" font-weight="400" fill="#445566" text-anchor="middle" letter-spacing="2">
      AUTOMOTIVE IVI SECURITY ASSESSMENT
    </text>

    <!-- Version badge -->
    <g transform="translate(517, 228)">
      <rect x="0" y="0" width="46" height="20" rx="4" fill="#00d4ff" opacity="0.15"/>
      <text x="23" y="14" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
            font-size="10" font-weight="600" fill="#00d4ff" text-anchor="middle">v2.0.0</text>
    </g>

    <!-- Python badge -->
    <g transform="translate(571, 228)">
      <rect x="0" y="0" width="66" height="20" rx="4" fill="#bf5af2" opacity="0.15"/>
      <text x="33" y="14" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
            font-size="10" font-weight="600" fill="#bf5af2" text-anchor="middle">Python 3.10+</text>
    </g>

    <!-- License badge -->
    <g transform="translate(645, 228)">
      <rect x="0" y="0" width="46" height="20" rx="4" fill="#ff3366" opacity="0.15"/>
      <text x="23" y="14" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace"
            font-size="10" font-weight="600" fill="#ff3366" text-anchor="middle">GPLv3</text>
    </g>

    <!-- Decorative dots pattern (subtle) -->
    <circle cx="250" cy="60" r="1.5" fill="#00d4ff" opacity="0.15"/>
    <circle cx="270" cy="50" r="1" fill="#00d4ff" opacity="0.1"/>
    <circle cx="290" cy="65" r="1.5" fill="#bf5af2" opacity="0.12"/>
    <circle cx="930" cy="70" r="1.5" fill="#bf5af2" opacity="0.12"/>
    <circle cx="950" cy="55" r="1" fill="#ff3366" opacity="0.1"/>
    <circle cx="910" cy="60" r="1" fill="#00d4ff" opacity="0.1"/>
    <circle cx="300" cy="245" r="1" fill="#00d4ff" opacity="0.1"/>
    <circle cx="900" cy="250" r="1.5" fill="#bf5af2" opacity="0.1"/>

    <!-- Corner accents -->
    <path d="M0,0 L40,0 L40,3 L3,3 L3,40 L0,40 Z" fill="#00d4ff" opacity="0.2"/>
    <path d="M1200,0 L1160,0 L1160,3 L1197,3 L1197,40 L1200,40 Z" fill="#bf5af2" opacity="0.2"/>
    <path d="M0,300 L40,300 L40,297 L3,297 L3,260 L0,260 Z" fill="#bf5af2" opacity="0.15"/>
    <path d="M1200,300 L1160,300 L1160,297 L1197,297 L1197,260 L1200,260 Z" fill="#ff3366" opacity="0.15"/>
  </g>
</svg>
