name: Full Security Assessment
description: Comprehensive vulnscan-driven assessment with follow-on recon
duration: ~10 minutes
risk: low (active probing may be detected)

steps:
  - command: vulnscan {target} -a {hci}
    description: Full vulnerability scan

  - command: recon {target} rfcomm
    description: Scan all 30 RFCOMM channels

  - command: recon {target} l2cap
    description: Scan L2CAP PSM range

  - command: recon {target} sniff -m lmp -d 30 -o lmp_capture.pcap
    description: Capture LMP security negotiation

  - command: report -o assessment_report.html
    description: Generate HTML report
