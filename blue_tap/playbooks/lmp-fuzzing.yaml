name: LMP Protocol Fuzzing
description: Below-HCI fuzzing via DarkFirmware RTL8761B
duration: variable (default 1 hour)
risk: high (may crash target device)
requires:
  - DarkFirmware adapter
  - Active connection to target

steps:
  - command: adapter firmware-status --hci {hci}
    description: Verify DarkFirmware is loaded

  - command: adapter firmware-set lmp-size 17
    description: Unlock full LMP PDU size

  - command: fuzz campaign {target} -p sdp -p rfcomm -p bnep --duration 1h --strategy coverage_guided
    description: Full multi-protocol fuzzing campaign

  - command: report -o fuzz_report.html
    description: Generate fuzzing report
