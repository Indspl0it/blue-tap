name: Quick Reconnaissance
description: Fast, non-destructive scan of a Bluetooth target
duration: ~2 minutes
risk: none

steps:
  - command: discover classic -d 10
    description: Discover nearby Bluetooth Classic devices

  - command: recon {target} fingerprint
    description: Fingerprint target device (version, features)

  - command: recon {target} sdp
    description: Enumerate SDP services

  - command: vulnscan {target}
    description: Run vulnerability assessment
